<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Feuer Workshop</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎛️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
:root{--fire:#FF4500;--fire2:#FF8C00;--yellow:#FFD700;--dark:#080808;--card:#111;--border:#222;--text:#F0EEE8;--muted:#666;--green:#39FF14}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Space Grotesk',sans-serif;padding:0}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;background:linear-gradient(135deg,var(--fire),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo span{font-size:14px;color:var(--muted);font-family:'Space Grotesk',sans-serif;-webkit-text-fill-color:var(--muted);margin-left:8px;letter-spacing:1px}
.ctrl-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:6px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .15s;border:1px solid}
.btn-fire{background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;border-color:transparent}
.btn-fire:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,69,0,.4)}
.btn-yellow{background:transparent;color:var(--yellow);border-color:var(--yellow)}
.btn-yellow:hover{background:rgba(255,215,0,.08)}
.btn-green{background:transparent;color:var(--green);border-color:var(--green)}
.btn-green:hover{background:rgba(57,255,20,.08)}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-ghost:hover{color:var(--text);border-color:#444}
.btn-red{background:transparent;color:#FF4444;border-color:#FF4444}
.btn-red:hover{background:rgba(255,68,68,.1)}
.timer-big{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--yellow);letter-spacing:3px;min-width:80px;text-align:center}
#connDot{font-size:12px;padding:3px 8px;border-radius:10px;font-weight:700}
.main{padding:24px;max-width:1300px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-bottom:24px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--fire);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.participant{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.participant:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.note-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.note-row:last-child{border-bottom:none}
.note-author{font-size:10px;color:var(--muted);margin-top:2px;flex-shrink:0}
.vote-count{margin-left:auto;font-size:12px;font-weight:700;color:var(--yellow);flex-shrink:0;padding-left:8px}
.board-section{margin-bottom:20px}
.board-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.empty{font-size:13px;color:var(--muted);font-style:italic}
.poker-sit{margin-bottom:16px;padding:14px;background:#0d0d0d;border-radius:8px;border:1px solid var(--border)}
.sit-q{font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.vote-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:700;border:1px solid}
.chip.hidden{filter:blur(8px)}
.wf-item{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.wf-item:last-child{border-bottom:none}
.wf-label{font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase}
.wf-text{font-family:'Caveat',cursive;font-size:16px;line-height:1.6;color:var(--text);white-space:pre-wrap}
.vision-item{margin-bottom:10px;padding:12px;background:#0d0d0d;border-radius:8px;border-left:3px solid}
.vis-text{font-family:'Caveat',cursive;font-size:17px;line-height:1.5;margin-bottom:4px}
.vis-meta{font-size:11px;color:var(--muted);display:flex;gap:12px}
.stats-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 20px;flex:1;min-width:120px;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:42px;background:linear-gradient(135deg,var(--fire),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

/* EXPORT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#111;border:1px solid #333;border-radius:16px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;padding:32px;position:relative}
.modal-close{position:absolute;top:16px;right:20px;background:transparent;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.export-section{margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.export-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.export-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;margin-bottom:16px}
.export-item{padding:10px 14px;background:#0d0d0d;border-radius:8px;margin-bottom:8px;font-size:14px;line-height:1.6;display:flex;gap:10px;align-items:flex-start}
.export-dot{flex-shrink:0;font-weight:700}
.export-meta{font-size:11px;color:var(--muted);margin-top:3px}
.export-vote{margin-left:auto;font-size:12px;font-weight:700;color:var(--yellow);flex-shrink:0;padding-left:12px}
.export-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}

@media print {
  .header,.modal-overlay{display:none!important}
  body{background:white;color:black}
  .panel{border:1px solid #ccc;break-inside:avoid}
  .stat-num{-webkit-text-fill-color:black;color:black}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">🎛️ ADMIN <span>Moderations-Dashboard</span></div>
  </div>
  <div class="ctrl-row">
    <div style="font-size:12px;color:var(--muted)">TIMER:</div>
    <button class="btn btn-yellow" onclick="startTimer(5*60)">5 Min</button>
    <button class="btn btn-yellow" onclick="startTimer(10*60)">10 Min</button>
    <button class="btn btn-yellow" onclick="startTimer(15*60)">15 Min</button>
    <button class="btn btn-ghost" onclick="stopTimer()">⏹ Stop</button>
    <div class="timer-big" id="timerBig">—</div>
    <button class="btn btn-green" onclick="openExport()">📊 Ergebnis-Export</button>
    <button class="btn btn-fire" onclick="window.print()">📄 Drucken</button>
    <button class="btn btn-red" onclick="resetAll()">↺ Reset</button>
    <div id="connDot">•••</div>
  </div>
</div>

<div class="main">
  <div class="stats-row" id="statsRow"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <button class="modal-close" onclick="closeExport()">✕</button>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;background:linear-gradient(135deg,var(--fire),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px">WORKSHOP ERGEBNISSE</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px" id="exportDate"></div>
    <div class="export-actions">
      <button class="btn btn-fire" onclick="printExport()">🖨️ Drucken / Als PDF speichern</button>
      <button class="btn btn-green" onclick="copyExport()">📋 Als Text kopieren</button>
    </div>
    <div id="exportContent"></div>
  </div>
</div>

<script>
const DLABELS=['','Tell','Sell','Consult','Agree','Advise','Inquire','Delegate'];
const DCOLS  =['','#FF4500','#FF6B35','#FFA040','#FFD700','#39FF14','#00BFFF','#AA44FF'];
const BOARDS=[
  {id:'bremst',label:'🛑 WAS BREMST?',color:'#FF4500'},
  {id:'antreibt',label:'⚡ WAS TREIBT AN?',color:'#FFD700'},
  {id:'aendern',label:'🔧 WAS ÄNDERN?',color:'#39FF14'},
  {id:'vision_braindump',label:'✨ IDEALVISION',color:'#00BFFF'},
];
const WF=[{id:'start',label:'START'},{id:'entscheid',label:'ENTSCHEID'},{id:'done',label:'DONE'},{id:'deploy',label:'DEPLOY'}];
const SITS=[
  "Bug Live-Kunde",
  "Technischer Ansatz",
  "Unklares Ticket",
  "Plan ändern",
  "Definition of Done",
  "Task ablehnen?",
  "Reporting-Pflicht",
  "Prozessverbesserung"
];
const SITS_FULL=[
  "Ein Bug betrifft einen Live-Kunden. Wie viel entscheidest du, bevor du jemanden fragst?",
  "Ein neues Feature: Wer entscheidet über den technischen Ansatz?",
  "Ein Ticket hat eine unklare Beschreibung. Fängst du einfach an?",
  "Du merkst, dass ein Ansatz nicht funktioniert. Änderst du den Plan?",
  "Aus deiner Sicht ist das Ticket fertig. Wer entscheidet, ob es wirklich done ist?",
  "Eine Aufgabe liegt außerhalb deiner Skills. Darf man ablehnen?",
  "Der Projektleiter fragt nicht nach Status. Wer ist fürs Reporting verantwortlich?",
  "Du siehst eine Prozessverbesserung. Setzt du sie einfach um?",
];

let ws, state={notes:{bremst:[],antreibt:[],aendern:[],vision_braindump:[]},poker:{},workflow:{start:'',entscheid:'',done:'',deploy:''},visions:[],participants:[]};
let timerInterval;

function connect() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => { setConn(true); ws.send(JSON.stringify({type:'SET_NAME',name:'🎛️ Admin'})); };
  ws.onclose = () => { setConn(false); setTimeout(connect,3000); };
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type==='INIT') { Object.assign(state, msg.state); render(); }
      else if (msg.type==='STATE_UPDATE') { Object.assign(state, msg); render(); }
      else if (msg.type==='PARTICIPANTS') { state.participants=msg.participants; render(); }
      else if (msg.type==='FULL_RESET') { Object.assign(state, msg.state); render(); }
    } catch(e){}
  };
}

function send(obj) { if(ws&&ws.readyState===1) ws.send(JSON.stringify(obj)); }
function setConn(ok) {
  const el=document.getElementById('connDot');
  el.textContent=ok?'LIVE':'OFFLINE';
  el.style.cssText=ok?'background:rgba(57,255,20,.1);color:#39FF14;border:1px solid rgba(57,255,20,.3);border-radius:10px;padding:3px 8px;font-size:12px;font-weight:700':'background:rgba(255,69,0,.1);color:#FF4500;border:1px solid rgba(255,69,0,.3);border-radius:10px;padding:3px 8px;font-size:12px;font-weight:700';
}

function render() {
  renderStats();
  renderGrid();
  if (state.timer) startTimerDisplay(state.timer);
}

function renderStats() {
  const totalNotes = Object.values(state.notes).reduce((s,a)=>s+a.length,0);
  const pokerVotes = Object.values(state.poker).reduce((s,v)=>s+Object.keys(v).length,0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-num">${state.participants.length}</div><div class="stat-label">Teilnehmer</div></div>
    <div class="stat"><div class="stat-num">${totalNotes}</div><div class="stat-label">Notizen total</div></div>
    <div class="stat"><div class="stat-num">${pokerVotes}</div><div class="stat-label">Poker-Votes</div></div>
    <div class="stat"><div class="stat-num">${state.visions.length}</div><div class="stat-label">Visionen</div></div>`;
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';

  // PARTICIPANTS
  g.innerHTML += `<div class="panel">
    <div class="panel-title">👥 TEILNEHMER <span style="font-size:13px;color:var(--muted)">${state.participants.length}</span></div>
    ${state.participants.length===0 ? '<div class="empty">Noch niemand verbunden</div>' :
      state.participants.map(p=>`<div class="participant">
        <div class="dot" style="background:${p.color}"></div>
        <span>${p.name}</span>
      </div>`).join('')}
  </div>`;

  // BRAINDUMP
  const braindumpHTML = BOARDS.map(b => {
    const notes = (state.notes[b.id]||[]).sort((a,bv)=>bv.votes-a.votes);
    return `<div class="board-section">
      <div class="board-label" style="color:${b.color}">${b.label} <span style="font-size:12px;color:var(--muted)">(${notes.length})</span></div>
      ${notes.length===0 ? '<div class="empty">Noch nichts</div>' :
        notes.map(n=>`<div class="note-row">
          <div>
            <div>${n.text}</div>
            <div class="note-author">${n.author}</div>
          </div>
          ${n.votes>0?`<div class="vote-count">+${n.votes}</div>`:''}
        </div>`).join('')}
    </div>`;
  }).join('');

  g.innerHTML += `<div class="panel" style="grid-column:span 2">
    <div class="panel-title">📝 BRAIN DUMP</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:20px">${braindumpHTML}</div>
  </div>`;

  // DELEGATION POKER
  const pokerHTML = SITS.map((sit,i) => {
    const votes = state.poker[i] || {};
    const allRevealed = Object.values(votes).every(v=>v.revealed);
    const vHTML = Object.values(votes).map(v=>`
      <div class="chip ${allRevealed?'':'hidden'}" style="border-color:${DCOLS[v.level]};color:${DCOLS[v.level]};background:${DCOLS[v.level]}18">
        ${v.name}: ${v.level} ${DLABELS[v.level]}
      </div>`).join('');
    return `<div class="poker-sit">
      <div style="font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:4px">SITUATION ${i+1}</div>
      <div class="sit-q">${sit}</div>
      ${Object.keys(votes).length===0 ? '<div class="empty">Keine Votes</div>' :
        `<div class="vote-chips">${vHTML}</div>
        <div style="display:flex;gap:8px;margin-top:10px">
          ${!allRevealed?`<button class="btn btn-yellow" style="font-size:11px;padding:4px 10px" onclick="reveal(${i})">Aufdecken</button>`:''}
          <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="resetSit(${i})">Reset</button>
        </div>`}
    </div>`;
  }).join('');

  g.innerHTML += `<div class="panel">
    <div class="panel-title">🃏 DELEGATION POKER</div>
    ${pokerHTML}
  </div>`;

  // WORKFLOW
  const wfHTML = WF.map(w => {
    const val = state.workflow[w.id];
    return `<div class="wf-item">
      <div class="wf-label">${w.label}</div>
      ${val ? `<div class="wf-text">${val}</div>` : '<div class="empty">Noch nichts</div>'}
    </div>`;
  }).join('');

  g.innerHTML += `<div class="panel">
    <div class="panel-title">⚙️ ARBEITSFLOW</div>
    ${wfHTML}
  </div>`;

  // VISIONS
  const visSorted = [...(state.visions||[])].sort((a,b)=>b.likes-a.likes);
  const visHTML = visSorted.map(v => {
    const hue = Math.abs(hashStr(v.text)) % 360;
    return `<div class="vision-item" style="border-color:hsl(${hue},65%,45%)">
      <div class="vis-text">${v.text}</div>
      <div class="vis-meta">
        <span style="color:${v.color}">${v.author}</span>
        ${v.likes>0?`<span>❤️ ${v.likes}</span>`:''}
      </div>
    </div>`;
  }).join('');

  g.innerHTML += `<div class="panel">
    <div class="panel-title">✨ VISIONEN <span style="font-size:13px;color:var(--muted)">${state.visions.length}</span></div>
    ${state.visions.length===0 ? '<div class="empty">Noch keine Visionen</div>' : visHTML}
  </div>`;
}

// ── EXPORT ────────────────────────────────────────────────────────

function openExport() {
  document.getElementById('exportDate').textContent =
    'Erstellt am ' + new Date().toLocaleDateString('de-DE', {day:'2-digit',month:'long',year:'numeric', hour:'2-digit', minute:'2-digit'}) + ' Uhr';
  document.getElementById('exportContent').innerHTML = buildExportHTML();
  document.getElementById('exportModal').classList.add('show');
}

function closeExport() {
  document.getElementById('exportModal').classList.remove('show');
}

function buildExportHTML() {
  let html = '';

  // ── PHASE 1: BRAIN DUMP ──
  html += `<div class="export-section">
    <div class="export-title" style="color:var(--fire)">📝 PHASE 1 – BRAIN DUMP</div>`;

  BOARDS.forEach(b => {
    const notes = (state.notes[b.id]||[]).sort((a,bv)=>bv.votes-a.votes);
    if (!notes.length) return;
    html += `<div style="margin-bottom:16px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:${b.color};margin-bottom:8px">${b.label}</div>`;
    notes.forEach((n,i) => {
      html += `<div class="export-item">
        <span class="export-dot" style="color:${b.color}">${i+1}.</span>
        <div>
          <div>${n.text}</div>
          <div class="export-meta">von ${n.author}${n.votes>0?' · '+n.votes+' Votes':''}</div>
        </div>
        ${n.votes>0?`<div class="export-vote">+${n.votes}</div>`:''}
      </div>`;
    });
    html += `</div>`;
  });

  // Top pain points summary
  const allNotes = Object.values(state.notes).flat().sort((a,b)=>b.votes-a.votes);
  const top5 = allNotes.filter(n=>n.votes>0).slice(0,5);
  if (top5.length) {
    html += `<div style="background:rgba(255,69,0,.08);border:1px solid rgba(255,69,0,.2);border-radius:8px;padding:14px;margin-top:8px">
      <div style="font-size:11px;letter-spacing:2px;color:var(--fire);font-weight:700;margin-bottom:10px">🔥 TOP PAIN POINTS (meiste Votes)</div>`;
    top5.forEach((n,i) => {
      html += `<div style="font-size:13px;padding:4px 0;display:flex;gap:8px">
        <span style="color:var(--fire);font-weight:700;flex-shrink:0">${i+1}.</span>
        <span>${n.text}</span>
        <span style="margin-left:auto;color:var(--yellow);font-weight:700;flex-shrink:0">+${n.votes}</span>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // ── PHASE 2: DELEGATION POKER ──
  const pokerEntries = Object.entries(state.poker).filter(([,v])=>v&&Object.keys(v).length>0);
  if (pokerEntries.length) {
    html += `<div class="export-section">
      <div class="export-title" style="color:var(--yellow)">🃏 PHASE 2 – DELEGATION POKER</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Ergebnis der Diskussion – vereinbarte Delegationsstufen</div>`;

    pokerEntries.forEach(([i,votes]) => {
      const vList = Object.values(votes);
      const allRevealed = vList.every(v=>v.revealed);
      const levels = vList.map(v=>v.level);
      const avg = levels.length ? (levels.reduce((a,b)=>a+b,0)/levels.length).toFixed(1) : '-';
      const consensus = levels.length && levels.every(l=>l===levels[0]);

      html += `<div class="export-item" style="flex-direction:column;gap:8px">
        <div style="display:flex;gap:10px;align-items:flex-start;width:100%">
          <span class="export-dot" style="color:var(--yellow)">Sit. ${parseInt(i)+1}</span>
          <div style="flex:1">
            <div style="font-weight:600;margin-bottom:4px">${SITS_FULL[i]}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">`;

      vList.forEach(v => {
        html += `<span style="padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;border:1px solid ${DCOLS[v.level]};color:${DCOLS[v.level]};background:${DCOLS[v.level]}18;${!allRevealed?'filter:blur(6px)':''}">
          ${v.name}: ${v.level} ${DLABELS[v.level]}
        </span>`;
      });

      html += `</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${consensus?'var(--green)':'var(--yellow)'}">Ø ${avg}</div>
            <div style="font-size:10px;color:var(--muted)">${consensus?'✅ Einig':'⚡ Diskussion'}</div>
          </div>
        </div>
      </div>`;
    });

    html += `<div style="background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:14px;margin-top:8px">
      <div style="font-size:11px;letter-spacing:2px;color:var(--yellow);font-weight:700;margin-bottom:6px">→ NÄCHSTER SCHRITT</div>
      <div style="font-size:13px;color:var(--muted)">Ergebnisse ins Delegation Board übertragen und im Büro aufhängen.</div>
    </div>
    </div>`;
  }

  // ── PHASE 3: ARBEITSFLOW ──
  const wfItems = WF.filter(w=>state.workflow[w.id]);
  if (wfItems.length) {
    html += `<div class="export-section">
      <div class="export-title" style="color:var(--green)">⚙️ PHASE 3 – ARBEITSFLOW</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Gemeinsam erarbeitete Definition of Done und Arbeitsregeln</div>`;

    wfItems.forEach(w => {
      const icons = {start:'🟢',entscheid:'🔵',done:'🟡',deploy:'🔴'};
      html += `<div class="export-item" style="flex-direction:column;gap:4px">
        <div style="font-size:11px;letter-spacing:2px;font-weight:700;color:var(--muted)">${icons[w.id]||''} ${w.label}</div>
        <div style="font-family:'Caveat',cursive;font-size:16px;line-height:1.6;white-space:pre-wrap">${state.workflow[w.id]}</div>
      </div>`;
    });

    html += `<div style="background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.2);border-radius:8px;padding:14px;margin-top:8px">
      <div style="font-size:11px;letter-spacing:2px;color:var(--green);font-weight:700;margin-bottom:6px">→ NÄCHSTER SCHRITT</div>
      <div style="font-size:13px;color:var(--muted)">In Wiki / Notion / Confluence übertragen und beim nächsten Sprint als verbindlich erklären.</div>
    </div>
    </div>`;
  }

  // ── PHASE 4: VISION ──
  if (state.visions.length) {
    const visSorted = [...state.visions].sort((a,b)=>b.likes-a.likes);
    html += `<div class="export-section">
      <div class="export-title" style="color:#00BFFF">✨ PHASE 4 – UNSERE VISION</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Antworten auf: "Wie muss diese Firma arbeiten, damit du es überall weitererzählst?"</div>`;

    visSorted.forEach((v,i) => {
      const hue = Math.abs(hashStr(v.text)) % 360;
      html += `<div class="export-item" style="border-left:3px solid hsl(${hue},65%,45%);background:#0d0d0d">
        <span class="export-dot" style="color:hsl(${hue},65%,55%)">${i+1}.</span>
        <div style="flex:1">
          <div style="font-family:'Caveat',cursive;font-size:17px;line-height:1.5">${v.text}</div>
          <div class="export-meta">von <span style="color:${v.color}">${v.author}</span></div>
        </div>
        ${v.likes>0?`<div style="color:var(--pink);font-weight:700;flex-shrink:0">❤️ ${v.likes}</div>`:''}
      </div>`;
    });

    const topVisions = visSorted.filter(v=>v.likes>0).slice(0,3);
    if (topVisions.length) {
      html += `<div style="background:rgba(0,191,255,.06);border:1px solid rgba(0,191,255,.2);border-radius:8px;padding:14px;margin-top:8px">
        <div style="font-size:11px;letter-spacing:2px;color:#00BFFF;font-weight:700;margin-bottom:8px">⭐ UNSER NORDSTERN (meiste Likes)</div>`;
      topVisions.forEach((v,i) => {
        html += `<div style="font-size:14px;padding:4px 0;font-family:'Caveat',cursive">"${v.text}" ❤️${v.likes}</div>`;
      });
      html += `<div style="font-size:12px;color:var(--muted);margin-top:10px">→ Ausdrucken, aufhängen, beim nächsten Retro in 4 Wochen wieder anschauen.</div>
      </div>`;
    }
    html += `</div>`;
  }

  // ── WENN NOCH NICHTS DA ──
  const hasAny = Object.values(state.notes).some(a=>a.length>0) || state.visions.length > 0 || Object.keys(state.poker).length > 0;
  if (!hasAny) {
    html = `<div style="text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:16px">🐕</div>
      <div style="font-size:16px">Noch keine Eingaben von Teilnehmern.</div>
      <div style="font-size:13px;margin-top:8px">Der Dackel wartet auf den Workshop-Start.</div>
    </div>`;
  }

  return html;
}

function copyExport() {
  let text = `FEUER WORKSHOP – ERGEBNISSE\n`;
  text += `Erstellt: ${new Date().toLocaleDateString('de-DE')}\n\n`;

  BOARDS.forEach(b => {
    const notes = (state.notes[b.id]||[]).sort((a,bv)=>bv.votes-a.votes);
    if (!notes.length) return;
    text += `${b.label}\n${'─'.repeat(40)}\n`;
    notes.forEach((n,i) => {
      text += `${i+1}. ${n.text}${n.votes>0?' (+'+n.votes+')':''} – ${n.author}\n`;
    });
    text += '\n';
  });

  Object.entries(state.poker).forEach(([i,votes]) => {
    if (!Object.keys(votes).length) return;
    text += `DELEGATION: Situation ${parseInt(i)+1}\n`;
    Object.values(votes).forEach(v => {
      text += `  ${v.name}: ${v.level} (${DLABELS[v.level]})\n`;
    });
    text += '\n';
  });

  WF.forEach(w => {
    if (!state.workflow[w.id]) return;
    text += `${w.label}:\n${state.workflow[w.id]}\n\n`;
  });

  if (state.visions.length) {
    text += `UNSERE VISION\n${'─'.repeat(40)}\n`;
    [...state.visions].sort((a,b)=>b.likes-a.likes).forEach((v,i) => {
      text += `${i+1}. "${v.text}" (${v.author}${v.likes>0?', ❤️'+v.likes:''})\n`;
    });
  }

  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Kopiert!';
    setTimeout(() => btn.textContent = '📋 Als Text kopieren', 2000);
  });
}

function startTimer(s) { send({type:'START_TIMER',seconds:s}); }
function stopTimer()   { send({type:'STOP_TIMER'}); clearInterval(timerInterval); document.getElementById('timerBig').textContent='—'; }
function reveal(i)     { send({type:'REVEAL_POKER',situation:i}); }
function resetSit(i)   { send({type:'RESET_POKER_SITUATION',situation:i}); }
function resetAll()    { if(confirm('Alle Daten löschen?')) send({type:'RESET_ALL'}); }

function startTimerDisplay(timer) {
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    const rem = Math.max(0,Math.ceil((timer.endsAt-Date.now())/1000));
    const m=Math.floor(rem/60).toString().padStart(2,'0');
    const s=(rem%60).toString().padStart(2,'0');
    const el=document.getElementById('timerBig');
    if(rem===0){el.textContent='⏰ ZEIT!';clearInterval(timerInterval);}
    else{el.textContent=`${m}:${s}`;el.style.color=rem<=30?'var(--fire)':'var(--yellow)';}
  },500);
}

function hashStr(s){let h=0;for(const c of String(s))h=(Math.imul(31,h)+c.charCodeAt(0))|0;return h;}

connect();
setInterval(render, 5000);
